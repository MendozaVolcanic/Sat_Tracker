name: Update TLEs

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC diario
  workflow_dispatch:       # botón de ejecución manual

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests skyfield

      - name: Refresh TLEs
        run: python scripts/export_data.py

      - name: Commit if changed
        run: |
          if git diff --quiet web/data/tle.json; then
            echo "No TLE changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/tle.json
          git commit -m "Refresh TLEs ($(date -u +%Y-%m-%d))"
          git push
